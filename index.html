<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prof Folio — Ackhil Nityanandam</title>
<meta name="description" content="Prof Folio — a career-building portfolio for product managers. Case studies, evidence-backed skills, interview-ready stories.">
<style>
:root{
  --bg:#fafaf8; --surface:#ffffff; --surface2:#f1efe9; --border:#e3e1d9; --border2:#cfccc2;
  --text:#1f1f1d; --muted:#6b6a64; --faint:#9b9a92;
  --accent:#534ab7; --accent-bg:#eeedfe; --accent-dark:#3c3489;
  --green:#1d9e75; --green-bg:#e1f5ee; --green-dark:#085041;
  --amber:#ba7517; --amber-bg:#faeeda; --amber-dark:#633806;
  --red:#a32d2d; --red-bg:#fcebeb; --red-dark:#791f1f;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
header{position:sticky;top:0;background:rgba(250,250,248,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);z-index:10}
.nav{max-width:980px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:12px 20px}
.brand{font-weight:600;font-size:15px}
.brand span{color:var(--accent)}
.nav button{background:none;border:none;font-size:13.5px;color:var(--muted);cursor:pointer;padding:6px 2px;border-bottom:2px solid transparent}
.nav button.active{color:var(--text);border-bottom-color:var(--accent)}
.nav .right{margin-left:auto;display:flex;gap:8px}
main{max-width:980px;margin:0 auto;padding:28px 20px 80px}
h1{font-size:26px;font-weight:650;line-height:1.25}
h2{font-size:18px;font-weight:600;margin:0 0 12px}
h3{font-size:15px;font-weight:600}
.sub{color:var(--muted);font-size:14px}
.grid{display:grid;gap:12px}
.cols2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.cols3{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.cols4{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.tile{background:var(--surface2);border-radius:var(--radius);padding:12px 14px}
.tile .lbl{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.tile .val{font-size:22px;font-weight:650;margin-top:2px}
.tile .ctx{font-size:12px;color:var(--faint)}
.badge{display:inline-block;font-size:11.5px;padding:2px 9px;border-radius:99px;font-weight:500}
.b-green{background:var(--green-bg);color:var(--green-dark)}
.b-amber{background:var(--amber-bg);color:var(--amber-dark)}
.b-red{background:var(--red-bg);color:var(--red-dark)}
.b-acc{background:var(--accent-bg);color:var(--accent-dark)}
.b-gray{background:var(--surface2);color:var(--muted)}
.bar{height:5px;border-radius:3px;background:var(--border);overflow:hidden;margin-top:8px}
.bar i{display:block;height:100%;background:var(--accent)}
.section{margin-top:34px}
button.btn{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:var(--text)}
button.btn:hover{background:var(--surface2)}
button.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
button.btn.danger{color:var(--red)}
button.icon{background:none;border:none;cursor:pointer;color:var(--faint);font-size:13px;padding:2px 6px}
button.icon:hover{color:var(--red)}
input[type=text],input[type=url],input[type=date],textarea,select{width:100%;border:1px solid var(--border2);border-radius:8px;padding:8px 10px;font-size:13.5px;font-family:inherit;background:var(--surface);color:var(--text)}
textarea{min-height:64px;resize:vertical}
label.f{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;font-weight:500}
.flex{display:flex;align-items:center;gap:10px}
.wrap{flex-wrap:wrap}
.spread{justify-content:space-between}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.heat{display:grid;grid-template-columns:140px repeat(4,30px);gap:4px;align-items:center;font-size:12.5px}
.cell{height:24px;border-radius:5px;background:var(--surface2)}
.cell.on{background:var(--green)}
.cell.part{background:#9fe1cb}
.week{width:15px;height:15px;border-radius:4px;background:var(--surface2)}
.week.lo{background:#9fe1cb}.week.hi{background:var(--green)}
.todo{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.todo:last-child{border-bottom:none}
.todo.done .txt{text-decoration:line-through;color:var(--faint)}
.star dt{font-size:12px;font-weight:600;color:var(--accent-dark);text-transform:uppercase;letter-spacing:.05em;margin-top:12px}
.star dd{margin:3px 0 0}
.empty{color:var(--faint);font-size:13px;font-style:italic;padding:8px 0}
.sidegrid{display:grid;grid-template-columns:190px minmax(0,1fr);gap:20px}
.sidenav{display:flex;flex-direction:column;gap:2px;position:sticky;top:70px;align-self:start}
.sidenav button{text-align:left;background:none;border:none;padding:8px 12px;font-size:13.5px;color:var(--muted);cursor:pointer;border-radius:8px}
.sidenav button.active{background:var(--accent-bg);color:var(--accent-dark);font-weight:500}
.itemrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.itemrow:last-child{border-bottom:none}
.avatar{width:96px;height:96px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);flex-shrink:0}
.av-fb{width:96px;height:96px;border-radius:50%;background:var(--accent-bg);color:var(--accent-dark);display:none;align-items:center;justify-content:center;font-size:30px;font-weight:600;flex-shrink:0}
.timeline{border-left:2px solid var(--border2);padding-left:18px;margin-left:6px}
.tl-item{position:relative;padding-bottom:20px}
.tl-item::before{content:"";position:absolute;left:-24px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.ring{transform:rotate(-90deg)}
details summary{cursor:pointer;list-style:none}
details summary::-webkit-details-marker{display:none}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 18px;border-radius:99px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:50}
.toast.show{opacity:1}
@media(max-width:720px){.sidegrid{grid-template-columns:1fr}.sidenav{position:static;flex-direction:row;overflow-x:auto}}
footer{border-top:1px solid var(--border);margin-top:60px}
.foot{max-width:980px;margin:0 auto;padding:18px 20px;font-size:12.5px;color:var(--faint);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
</style>
</head>

<script>
const SKEY="profFolio.v1";
let D=load();
function load(){
  try{const ls=localStorage.getItem(SKEY); if(ls) return JSON.parse(ls);}catch(e){}
  return JSON.parse(document.getElementById("seed").textContent);
}
function save(msg){
  D.activity=D.activity||[];
  const wk=new Date().toISOString().slice(0,10);
  if(!D.activity.includes(wk)) D.activity.push(wk);
  try{localStorage.setItem(SKEY,JSON.stringify(D));}catch(e){}
  if(msg) toast(msg);
}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);}
function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function uid(p){return p+Math.random().toString(36).slice(2,8);}

/* ---------- scoring ---------- */
function csScore(cs){
  const checks=[cs.situation,cs.task,cs.action,cs.result,cs.learning,cs.cut30,cs.cut2min];
  const base=checks.filter(x=>x&&x.trim()).length/checks.length;
  return Math.round(base*100);
}
function metricComplete(m){return !!(m.baseline&&m.baseline.trim()&&m.measured&&m.measured.trim());}
function healthScore(){
  const cs=D.caseStudies.length?D.caseStudies.reduce((a,c)=>a+csScore(c),0)/(D.caseStudies.length*100):0;
  const sk=D.skills.length?D.skills.filter(s=>s.evidence.length).length/D.skills.length:0;
  const mt=D.metrics.length?D.metrics.filter(metricComplete).length/D.metrics.length:0;
  const cov=D.competencyList.length?D.competencyList.filter(c=>D.caseStudies.some(s=>s.competencies.includes(c))).length/D.competencyList.length:0;
  return Math.round((cs*0.35+sk*0.25+mt*0.2+cov*0.2)*100);
}
function alerts(){
  const out=[];
  const today=new Date().toISOString().slice(0,10);
  D.learning.forEach(l=>{if(l.expires&&l.expires<today)out.push(`${l.title} expired ${l.expires}`);});
  const mm=D.metrics.filter(m=>!metricComplete(m)).length;
  if(mm)out.push(`${mm} metric${mm>1?"s":""} missing baseline or measurement method`);
  const drafts=D.caseStudies.filter(c=>csScore(c)<70).length;
  if(drafts)out.push(`${drafts} case stud${drafts>1?"ies":"y"} below 70% complete`);
  return out;
}
function nextActions(){
  const out=[];
  const gap=D.competencyList.find(c=>!D.caseStudies.some(s=>s.competencies.includes(c)));
  if(gap)out.push(`Add a story covering “${gap}” — interview blind spot`);
  const weak=[...D.caseStudies].sort((a,b)=>csScore(a)-csScore(b))[0];
  if(weak&&csScore(weak)<100)out.push(`Complete “${weak.title}” (${csScore(weak)}%)`);
  const unproven=D.skills.find(s=>!s.evidence.length);
  if(unproven)out.push(`Evidence the skill “${unproven.name}” or remove it`);
  const art=D.artefacts.filter(a=>a.public).length;
  if(!art)out.push("Publish at least one artefact");
  return out.slice(0,4);
}

/* ---------- router ---------- */
const V=document.getElementById("view");
function go(v){
  location.hash=v;
}
function route(){
  const v=(location.hash||"#showcase").slice(1).split("/")[0];
  document.querySelectorAll(".nav [data-v]").forEach(b=>b.classList.toggle("active",b.dataset.v===v));
  ({showcase,dashboard,actions,editor}[v]||showcase)();
  window.scrollTo(0,0);
}
window.addEventListener("hashchange",route);
document.querySelectorAll(".nav [data-v]").forEach(b=>b.onclick=()=>go(b.dataset.v));

/* ---------- showcase ---------- */
function showcase(){

    <div>
      <h1>${esc(p.name)}</h1>
      <p class="sub" style="margin-top:4px">${esc(p.headline)} · ${esc(p.location)}</p>
    </div>
  </div>
  <p style="margin-top:14px;max-width:640px">${esc(p.positioning)}</p>
  <p class="small muted" style="margin-top:8px">${esc(p.openTo)}</p>
  <div class="flex wrap" style="margin-top:14px;gap:8px">
    <a class="btn" style="padding:7px 14px;border:1px solid var(--border2);border-radius:8px;font-size:13px" href="mailto:${esc(p.email)}">Email</a>
    <a class="btn" style="padding:7px 14px;border:1px solid var(--border2);border-radius:8px;font-size:13px" href="${esc(p.linkedin)}" target="_blank" rel="noopener">LinkedIn</a>
    <a class="btn" style="padding:7px 14px;border:1px solid var(--border2);border-radius:8px;font-size:13px" href="${esc(p.github)}" target="_blank" rel="noopener">GitHub</a>
  </div>

  <div class="section"><h2>Impact</h2>
    <div class="grid cols3">${D.metrics.filter(m=>m.public).map(m=>`
      <div class="tile"><div class="lbl">${esc(m.label)}</div><div class="val">${esc(m.value)}</div><div class="ctx">${esc(m.context)}</div></div>`).join("")}
    </div></div>

  <div class="section"><h2>Case studies</h2>
    <div class="grid cols2">${D.caseStudies.filter(c=>c.public).map(c=>`
      <div class="card"><details>
        <summary>
          <div class="flex spread"><h3>${esc(c.title)}</h3><span class="badge ${csScore(c)>=70?"b-green":"b-amber"}">${csScore(c)>=70?"ready":"draft"}</span></div>
          <p class="small muted" style="margin-top:2px">${esc(c.domain)}</p>
          <p class="small" style="margin-top:8px">${esc(c.result||c.task)}</p>
          <p style="margin-top:8px">${c.competencies.map(t=>`<span class="badge b-acc">${esc(t)}</span>`).join(" ")}</p>
          <p class="small" style="color:var(--accent);margin-top:8px">Open full story ↓</p>
        </summary>
        <dl class="star">
          ${["situation","task","action","result","learning"].map(k=>c[k]?`<dt>${k}</dt><dd>${esc(c[k])}</dd>`:"").join("")}
        </dl>
      </details></div>`).join("")}
    </div></div>

  <div class="section"><h2>Skills — evidence-backed</h2>
    <div class="card"><div class="flex wrap" style="gap:8px">
      ${D.skills.map(s=>`<span class="badge ${s.evidence.length?"b-green":"b-gray"}" title="${s.evidence.length?"Proven in a case study":"Claimed — no evidence linked yet"}">${esc(s.name)}${s.evidence.length?" ✓":""}</span>`).join("")}
    </div>
    <p class="small muted" style="margin-top:10px">✓ = linked to a case study above. Unticked skills are claimed, not yet evidenced.</p></div></div>

  <div class="section"><h2>Career timeline</h2>
    <div class="timeline">${D.timeline.filter(t=>t.public).map(t=>`
      <div class="tl-item"><h3>${esc(t.role)} · ${esc(t.org)}</h3>
      <p class="small muted">${esc(t.dates)} · ${esc(t.where)}</p>
      <p class="small" style="margin-top:3px">${esc(t.scope)}</p></div>`).join("")}
    </div></div>

  ${D.artefacts.filter(a=>a.public).length?`<div class="section"><h2>Artefacts</h2>
    <div class="grid cols2">${D.artefacts.filter(a=>a.public).map(a=>`
      <div class="card"><div class="flex spread"><h3>${esc(a.title)}</h3><span class="badge b-gray">${esc(a.type)}</span></div>
      <p class="small muted" style="margin-top:6px">${esc(a.notes)}</p>
      ${a.link?`<p style="margin-top:8px"><a href="${esc(a.link)}" target="_blank" rel="noopener">View →</a></p>`:""}</div>`).join("")}
    </div></div>`:""}

  ${D.testimonials.filter(q=>q.public).length?`<div class="section"><h2>What colleagues say</h2>
    <div class="grid cols2">${D.testimonials.filter(q=>q.public).map(q=>`
      <div class="card"><p style="font-style:italic">“${esc(q.quote)}”</p>
      <p class="small muted" style="margin-top:10px">— ${esc(q.who)}, ${esc(q.context)}</p></div>`).join("")}
    </div></div>`:""}`;
}

/* ---------- dashboard ---------- */
function dashboard(){
  const h=healthScore(), al=alerts(), na=nextActions();
  const ready=D.caseStudies.filter(c=>csScore(c)>=70).length;
  const proven=D.skills.filter(s=>s.evidence.length).length;
  const pub=[...D.metrics,...D.caseStudies,...D.artefacts,...D.testimonials].filter(x=>x.public).length;
  const tot=[...D.metrics,...D.caseStudies,...D.artefacts,...D.testimonials].length;
  const todosOpen=D.actions.todos.filter(t=>!t.done).length;
  const toRead=D.actions.reading.filter(r=>r.status==="to read").length;
  const circ=2*Math.PI*30, dash=circ*h/100;
  const weeks=lastWeeks(12);
  V.innerHTML=`
  <div class="flex spread wrap"><h1 style="font-size:22px">Career cockpit</h1>
  <span class="small muted">Private view — visitors land on Showcase</span></div>

  <div class="grid cols4" style="margin-top:18px">
    <div class="tile" style="display:flex;flex-direction:column;align-items:center">
      <svg class="ring" width="76" height="76" viewBox="0 0 76 76" role="img" aria-label="Portfolio health ${h}%">
        <circle cx="38" cy="38" r="30" fill="none" stroke="var(--border)" stroke-width="7"/>
        <circle cx="38" cy="38" r="30" fill="none" stroke="${h>=70?"var(--green)":h>=40?"#ef9f27":"var(--red)"}" stroke-width="7" stroke-linecap="round" stroke-dasharray="${dash} ${circ}"/>
      </svg>
      <div class="val" style="margin-top:-52px">${h}</div>
      <div class="lbl" style="margin-top:34px">Portfolio health</div>
    </div>
    <div class="tile"><div class="lbl">Case studies</div><div class="val">${ready}<span class="ctx" style="font-size:13px"> ready · ${D.caseStudies.length-ready} draft</span></div>
      <div class="bar"><i style="width:${D.caseStudies.length?ready/D.caseStudies.length*100:0}%;background:var(--accent)"></i></div></div>
    <div class="tile"><div class="lbl">Skills proven</div><div class="val">${proven}<span class="ctx" style="font-size:13px">/${D.skills.length}</span></div>
      <div class="bar"><i style="width:${D.skills.length?proven/D.skills.length*100:0}%;background:var(--green)"></i></div></div>
    <div class="tile"><div class="lbl">Public items</div><div class="val">${pub}<span class="ctx" style="font-size:13px">/${tot}</span></div>
      <div class="bar"><i style="width:${tot?pub/tot*100:0}%;background:#d85a30"></i></div></div>
  </div>

  <div class="grid" style="grid-template-columns:minmax(0,1.35fr) minmax(0,1fr);margin-top:14px">
    <div class="card"><h2 style="font-size:15px">Story bank coverage</h2>
      <div class="heat">${D.competencyList.map(c=>{
        const hits=D.caseStudies.filter(s=>s.competencies.includes(c));
        return `<span class="muted">${esc(c)}</span>`+[0,1,2,3].map(i=>{
          const s=hits[i];
          return `<span class="cell ${s?(csScore(s)>=70?"on":"part"):""}" title="${s?esc(s.title)+" ("+csScore(s)+"%)":"no story yet"}"></span>`;}).join("");
      }).join("")}</div>
      <p class="small muted" style="margin-top:10px">Dark = interview-ready story · light = draft · empty row = blind spot</p></div>

    <div style="display:flex;flex-direction:column;gap:12px">
      ${al.length?`<div class="card" style="border-color:#f0c1c1;background:var(--red-bg)">
        <h3 style="color:var(--red-dark)">⚠ Action needed</h3>
        ${al.map(a=>`<p class="small" style="color:var(--red-dark);margin-top:5px">• ${esc(a)}</p>`).join("")}</div>`:""}
      <div class="card"><h3>🎯 Next best actions</h3>
        ${na.map((a,i)=>`<p class="small" style="margin-top:5px">${i+1}. ${esc(a)}</p>`).join("")||'<p class="empty">All caught up</p>'}</div>
      <div class="card"><h3>🔥 Momentum</h3>
        <div class="flex" style="gap:3px;margin-top:8px">${weeks.map(w=>`<span class="week ${w?"hi":""}" title="${w?"active":"no updates"}"></span>`).join("")}</div>
        <p class="small muted" style="margin-top:6px">Weeks with portfolio updates, last 12</p></div>
    </div>
  </div>

  <div class="grid cols2" style="margin-top:14px">
    <div class="card flex spread"><div><h3>Open to-dos</h3><p class="small muted">${todosOpen} pending</p></div>
      <button class="btn" onclick="go('actions')">Open actions →</button></div>
    <div class="card flex spread"><div><h3>Reading queue</h3><p class="small muted">${toRead} to read · ${D.actions.reading.filter(r=>r.type==="feed").length} feeds</p></div>
      <button class="btn" onclick="go('actions')">Open reading →</button></div>
  </div>`;
}
function lastWeeks(n){
  const acts=(D.activity||[]).map(d=>weekKey(new Date(d)));
  const out=[];const now=new Date();
  for(let i=n-1;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i*7);out.push(acts.includes(weekKey(d)));}
  return out;
}
function weekKey(d){const o=new Date(d);o.setDate(o.getDate()-o.getDay());return o.toISOString().slice(0,10);}

/* ---------- actions ---------- */
function actions(){
  const T=D.actions.todos,R=D.actions.reading;
  V.innerHTML=`
  <h1 style="font-size:22px">Actions</h1>
  <div class="grid cols2" style="margin-top:18px;align-items:start">
    <div class="card">
      <h2>To-dos <span class="badge b-acc">${T.filter(t=>!t.done).length} open</span></h2>
      <div class="flex" style="margin:10px 0">
        <input type="text" id="todo-in" placeholder="Add a career to-do…">
        <select id="todo-pr" style="width:84px"><option value="p1">P1</option><option value="p2" selected>P2</option><option value="p3">P3</option></select>
        <button class="btn primary" onclick="addTodo()">Add</button>
      </div>
      <div>${T.length?T.map(t=>`
        <div class="todo ${t.done?"done":""}">
          <input type="checkbox" ${t.done?"checked":""} onchange="togTodo('${t.id}')" aria-label="done">
          <span class="txt" style="flex:1">${esc(t.text)}</span>
          <span class="badge ${t.priority==="p1"?"b-red":t.priority==="p2"?"b-amber":"b-gray"}">${t.priority.toUpperCase()}</span>
          <button class="icon" onclick="delTodo('${t.id}')" aria-label="delete">✕</button>
        </div>`).join(""):'<p class="empty">Nothing yet — add your first to-do.</p>'}
      </div>
    </div>

    <div class="card">
      <h2>Reading &amp; feeds <span class="badge b-acc">${R.filter(r=>r.status==="to read").length} to read</span></h2>
      <div style="margin:10px 0">
        <input type="text" id="rd-title" placeholder="Title">
        <div class="flex" style="margin-top:6px">
          <input type="url" id="rd-url" placeholder="https://…">
          <select id="rd-type" style="width:104px"><option value="article">Article</option><option value="feed">Feed/RSS</option><option value="video">Video</option></select>
          <button class="btn primary" onclick="addRead()">Add</button>
        </div>
      </div>
      ${["feed","article","video"].map(tp=>{
        const items=R.filter(r=>r.type===tp);
        if(!items.length)return "";
        return `<h3 style="margin-top:14px">${tp==="feed"?"Feeds":tp==="article"?"Articles":"Videos"}</h3>`+items.map(r=>`
        <div class="itemrow">
          <div style="min-width:0"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title)}</a>
            <p class="small muted">${esc(r.tags||"")}</p></div>
          <div class="flex" style="gap:6px;flex-shrink:0">
            ${tp!=="feed"?`<select onchange="readStatus('${r.id}',this.value)" style="width:auto;font-size:12px;padding:4px 6px">
              ${["to read","reading","done"].map(s=>`<option ${r.status===s?"selected":""}>${s}</option>`).join("")}</select>`:'<span class="badge b-green">subscribed</span>'}
            <button class="icon" onclick="delRead('${r.id}')" aria-label="delete">✕</button>
          </div>
        </div>`).join("");
      }).join("")}
      <p class="small muted" style="margin-top:12px">Feeds open in a new tab. In-app RSS preview is on the roadmap (needs a fetch proxy).</p>
    </div>
  </div>`;
}
function addTodo(){const i=document.getElementById("todo-in");if(!i.value.trim())return;
  D.actions.todos.unshift({id:uid("td"),text:i.value.trim(),priority:document.getElementById("todo-pr").value,done:false});save("To-do added");actions();}
function togTodo(id){const t=D.actions.todos.find(x=>x.id===id);t.done=!t.done;save();actions();}
function delTodo(id){D.actions.todos=D.actions.todos.filter(x=>x.id!==id);save("Deleted");actions();}
function addRead(){const t=document.getElementById("rd-title"),u=document.getElementById("rd-url");
  if(!t.value.trim()||!u.value.trim())return toast("Title and URL required");
  const tp=document.getElementById("rd-type").value;
  D.actions.reading.unshift({id:uid("r"),title:t.value.trim(),url:u.value.trim(),type:tp,status:tp==="feed"?"subscribed":"to read",tags:""});
  save("Added to reading");actions();}
function readStatus(id,s){D.actions.reading.find(x=>x.id===id).status=s;save();}
function delRead(id){D.actions.reading=D.actions.reading.filter(x=>x.id!==id);save("Deleted");actions();}

/* ---------- editor ---------- */
let eSec="profile";
function editor(){
  const secs=[["profile","Profile"],["metrics","Metrics"],["caseStudies","Case studies"],["skills","Skills"],["timeline","Timeline"],["artefacts","Artefacts"],["learning","Learning log"],["testimonials","Testimonials"],["json","Raw JSON"]];
  V.innerHTML=`
  <div class="flex spread wrap"><h1 style="font-size:22px">Editor</h1>
    <span class="small muted">Saves to this browser · Export JSON → commit to GitHub to publish</span></div>
  <div class="sidegrid" style="margin-top:18px">
    <div class="sidenav">${secs.map(([k,l])=>`<button class="${eSec===k?"active":""}" onclick="eSec='${k}';editor()">${l}</button>`).join("")}</div>
    <div id="epane"></div>
  </div>`;
  const P=document.getElementById("epane");
  if(eSec==="profile")P.innerHTML=editProfile();
  else if(eSec==="metrics")P.innerHTML=editMetrics();
  else if(eSec==="caseStudies")P.innerHTML=editCases();
  else if(eSec==="skills")P.innerHTML=editSkills();
  else if(eSec==="json")P.innerHTML=editJSON();
  else P.innerHTML=editGeneric(eSec);
}
function fld(label,id,val,ta){return `<label class="f">${label}</label>${ta?`<textarea id="${id}">${esc(val)}</textarea>`:`<input type="text" id="${id}" value="${esc(val)}">`}`;}
function editProfile(){const p=D.profile;
  return `<div class="card">
  ${fld("Name","ep-name",p.name)}
  <label class="f">Profile photo</label>
  <div class="flex wrap" style="gap:12px;align-items:center">
    ${p.photo?`<img src="${esc(p.photo)}" alt="current photo" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:1px solid var(--border2)" onerror="this.style.display='none'">`:`<span class="av-fb" style="display:flex;width:64px;height:64px;font-size:20px">${esc((p.name||"?").split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase())}</span>`}
    <button class="btn" onclick="document.getElementById('ep-photofile').click()">Upload photo…</button>
    ${p.photo?`<button class="btn danger" onclick="D.profile.photo='';save('Photo removed');editor()">Remove</button>`:""}
    <input type="file" id="ep-photofile" accept="image/*" hidden onchange="handlePhoto(this)">
  </div>
  <p class="small muted" style="margin-top:6px">Any image file (JPG, PNG, WebP, GIF, SVG…), any name — it's resized and embedded into your portfolio data automatically. No separate file to commit.</p>
  ${fld("Or paste an image URL / repo filename (overrides upload)","ep-photo",String(p.photo||"").startsWith("data:")?"":(p.photo||""))}
  ${fld("Headline","ep-head",p.headline)}${fld("Location","ep-loc",p.location)}
  ${fld("Email","ep-mail",p.email)}${fld("LinkedIn URL","ep-li",p.linkedin)}${fld("GitHub URL","ep-gh",p.github)}
  ${fld("Positioning statement","ep-pos",p.positioning,1)}${fld("Open-to line","ep-open",p.openTo)}
  <div style="margin-top:14px"><button class="btn primary" onclick="saveProfile()">Save profile</button></div></div>`;}
function handlePhoto(input){
  const f=input.files[0];if(!f)return;
  if(!/^image\//.test(f.type))return toast("Please choose an image file");
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const S=400,c=document.createElement("canvas");c.width=S;c.height=S;
      const x=c.getContext("2d");
      const side=Math.min(img.width,img.height);
      x.drawImage(img,(img.width-side)/2,(img.height-side)/2,side,side,0,0,S,S);
      D.profile.photo=c.toDataURL("image/jpeg",0.85);
      save("Photo uploaded — Export JSON and commit to publish");editor();
    };
    img.onerror=()=>toast("Couldn't read that image — try JPG or PNG");
    img.src=r.result;
  };
  r.readAsDataURL(f);
}
function saveProfile(){const g=id=>document.getElementById(id).value;
  const u=g("ep-photo").trim();
  const photo=u||(String(D.profile.photo||"").startsWith("data:")?D.profile.photo:"");
  Object.assign(D.profile,{name:g("ep-name"),photo,headline:g("ep-head"),location:g("ep-loc"),email:g("ep-mail"),linkedin:g("ep-li"),github:g("ep-gh"),positioning:g("ep-pos"),openTo:g("ep-open")});
  save("Profile saved");}
function editMetrics(){return D.metrics.map(m=>`<div class="card" style="margin-bottom:12px">
  <div class="flex spread"><h3>${esc(m.label)}</h3>
    <span class="badge ${metricComplete(m)?"b-green":"b-red"}">${metricComplete(m)?"complete":"needs context"}</span></div>
  ${fld("Label","em-l-"+m.id,m.label)}${fld("Headline value","em-v-"+m.id,m.value)}${fld("Context line","em-c-"+m.id,m.context)}
  ${fld("Baseline (required)","em-b-"+m.id,m.baseline)}${fld("How measured (required)","em-m-"+m.id,m.measured)}${fld("Your role","em-r-"+m.id,m.role)}
  <div class="flex" style="margin-top:12px"><button class="btn primary" onclick="saveMetric('${m.id}')">Save</button>
    <label class="small flex" style="gap:6px"><input type="checkbox" ${m.public?"checked":""} onchange="togPub('metrics','${m.id}')">Public</label></div>
  </div>`).join("")+`<button class="btn" onclick="D.metrics.push({id:uid('m'),label:'New metric',value:'',context:'',baseline:'',measured:'',role:'',public:false});save();editor()">+ Add metric</button>`;}
function saveMetric(id){const m=D.metrics.find(x=>x.id===id),g=k=>document.getElementById("em-"+k+"-"+id).value;
  Object.assign(m,{label:g("l"),value:g("v"),context:g("c"),baseline:g("b"),measured:g("m"),role:g("r")});save("Metric saved");editor();}
function editCases(){return D.caseStudies.map(c=>`<div class="card" style="margin-bottom:12px">
  <div class="flex spread"><h3>${esc(c.title)}</h3><span class="badge ${csScore(c)>=70?"b-green":"b-amber"}">${csScore(c)}% complete</span></div>
  <div class="bar"><i style="width:${csScore(c)}%;background:${csScore(c)>=70?"var(--green)":"#ef9f27"}"></i></div>
  ${fld("Title","ec-t-"+c.id,c.title)}${fld("Domain","ec-d-"+c.id,c.domain)}
  ${fld("Situation","ec-s-"+c.id,c.situation,1)}${fld("Task","ec-k-"+c.id,c.task,1)}
  ${fld("Action — what YOU did","ec-a-"+c.id,c.action,1)}${fld("Result — include baseline & how measured","ec-r-"+c.id,c.result,1)}
  ${fld("Learning","ec-l-"+c.id,c.learning,1)}${fld("30-second interview cut","ec-c3-"+c.id,c.cut30,1)}${fld("2-minute interview cut","ec-c2-"+c.id,c.cut2min,1)}
  <label class="f">Competencies covered</label>
  <div class="flex wrap" style="gap:8px">${D.competencyList.map(cp=>`<label class="small flex" style="gap:4px"><input type="checkbox" ${c.competencies.includes(cp)?"checked":""} onchange="togComp('${c.id}','${esc(cp)}')">${esc(cp)}</label>`).join("")}</div>
  <div class="flex" style="margin-top:12px"><button class="btn primary" onclick="saveCase('${c.id}')">Save</button>
    <label class="small flex" style="gap:6px"><input type="checkbox" ${c.public?"checked":""} onchange="togPub('caseStudies','${c.id}')">Public</label>
    <button class="btn danger" onclick="if(confirm('Delete this case study?')){D.caseStudies=D.caseStudies.filter(x=>x.id!=='${c.id}');save('Deleted');editor()}">Delete</button></div>
  </div>`).join("")+`<button class="btn" onclick="D.caseStudies.push({id:uid('cs'),title:'New case study',domain:'',situation:'',task:'',action:'',result:'',learning:'',cut30:'',cut2min:'',competencies:[],public:false,status:'draft'});save();editor()">+ Add case study</button>`;}
function saveCase(id){const c=D.caseStudies.find(x=>x.id===id),g=k=>document.getElementById("ec-"+k+"-"+id).value;
  Object.assign(c,{title:g("t"),domain:g("d"),situation:g("s"),task:g("k"),action:g("a"),result:g("r"),learning:g("l"),cut30:g("c3"),cut2min:g("c2")});save("Case study saved");editor();}
function togComp(id,cp){const c=D.caseStudies.find(x=>x.id===id);
  c.competencies=c.competencies.includes(cp)?c.competencies.filter(x=>x!==cp):[...c.competencies,cp];save();}
function togPub(coll,id){const x=D[coll].find(i=>i.id===id);x.public=!x.public;save();}
function editSkills(){return `<div class="card">
  ${D.skills.map(s=>`<div class="itemrow"><span>${esc(s.name)} ${s.evidence.length?'<span class="badge b-green">proven</span>':'<span class="badge b-gray">claimed</span>'}</span>
    <div class="flex" style="gap:6px"><select onchange="linkSkill('${s.id}',this.value)" style="width:auto;font-size:12px;padding:4px 6px">
      <option value="">link evidence…</option>${D.caseStudies.map(c=>`<option value="${c.id}" ${s.evidence.includes(c.id)?"selected":""}>${esc(c.title)}</option>`).join("")}</select>
    <button class="icon" onclick="D.skills=D.skills.filter(x=>x.id!=='${s.id}');save('Deleted');editor()">✕</button></div></div>`).join("")}
  <div class="flex" style="margin-top:12px"><input type="text" id="sk-new" placeholder="New skill"><button class="btn primary" onclick="if(document.getElementById('sk-new').value.trim()){D.skills.push({id:uid('s'),name:document.getElementById('sk-new').value.trim(),evidence:[]});save('Skill added');editor()}">Add</button></div></div>`;}
function linkSkill(id,cs){const s=D.skills.find(x=>x.id===id);if(cs&&!s.evidence.includes(cs))s.evidence.push(cs);save("Evidence linked");editor();}
function editGeneric(sec){return `<div class="card"><p class="small muted">Quick edit for ${sec} — use the fields below or Raw JSON for full control.</p>
  ${D[sec].map(it=>`<div class="itemrow"><span>${esc(it.title||it.role||it.who||it.name||it.id)}</span>
    <label class="small flex" style="gap:6px"><input type="checkbox" ${it.public?"checked":""} onchange="togPub('${sec}','${it.id}')">Public</label></div>`).join("")}
  <p class="small muted" style="margin-top:10px">Add/edit items via the Raw JSON section for now (v1).</p></div>`;}
function editJSON(){return `<div class="card"><p class="small muted">Full data — edit carefully, then Apply.</p>
  <textarea id="rawjson" style="min-height:340px;font-family:monospace;font-size:12px">${esc(JSON.stringify(D,null,2))}</textarea>
  <div style="margin-top:12px"><button class="btn primary" onclick="try{D=JSON.parse(document.getElementById('rawjson').value);save('JSON applied');editor()}catch(e){toast('Invalid JSON: '+e.message)}">Apply</button>
  <button class="btn" onclick="if(confirm('Reset to the seed data shipped with this repo? Your local edits will be lost.')){localStorage.removeItem(SKEY);D=load();save();route();toast('Reset to seed')}">Reset to seed</button></div></div>`;}

/* ---------- import / export ---------- */
document.getElementById("btn-export").onclick=()=>{
  const blob=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="portfolio.json";a.click();
  toast("portfolio.json downloaded — commit it to your repo to publish");
};
document.getElementById("btn-import").onclick=()=>document.getElementById("file-import").click();
document.getElementById("file-import").onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>{try{D=JSON.parse(r.result);save("Imported");route();}catch(err){toast("Invalid JSON file");}};r.readAsText(f);
};

/* ---------- boot: prefer committed portfolio.json over seed (not over local edits) ---------- */
(async()=>{
  if(!localStorage.getItem(SKEY)){
    try{const res=await fetch("portfolio.json",{cache:"no-store"});
      if(res.ok){D=await res.json();}}catch(e){}
  }
  route();
})();
</script>
</body>
